<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <g transform="translate(256,240)">
    <!-- mic body -->
    <rect x="-40" y="-100" width="80" height="140" rx="40" fill="#3b82f6"/>
    <!-- mic arc -->
    <path d="M-65,20 a65,65 0 0,0 130,0" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round"/>
    <!-- mic stand -->
    <line x1="0" y1="85" x2="0" y2="130" stroke="#3b82f6" stroke-width="14" stroke-linecap="round"/>
    <!-- arrow right -->
    <path d="M50,160 l40,0 m-14,-14 l14,14 l-14,14" fill="none" stroke="#e5e5e5" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- monitor -->
    <rect x="110" y="135" width="50" height="50" rx="6" fill="none" stroke="#e5e5e5" stroke-width="8"/>
    <line x1="135" y1="185" x2="135" y2="200" stroke="#e5e5e5" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
